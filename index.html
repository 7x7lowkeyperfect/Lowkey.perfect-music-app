<!DOCTYPE html>
<html>
<head>
    <title>My Music App</title>

    <style>
        body {
            background-color: #f5f5f5;
            color: #3e2723;
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #5d4037;
        }

        .card {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }

        button {
            background-color: #6d4c41;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            color: white;
            font-size: 14px;
            border-radius: 20px;
        }
    </style>

</head>
<body>

    <h1>🎧 My Music App</h1>

    <div class="card">
        <p id="nowPlaying">Now Playing: Select a Song</p>

        <ul>
            <li onclick="playMusic(0)">🎵 Song 1</li>
            <li onclick="playMusic(1)">🎵 Song 2</li>
            <li onclick="playMusic(2)">🎵 Song 3</li>
        </ul>

        <button onclick="prevSong()">⏮ Prev</button>
        <button onclick="play()">▶ Play</button>
        <button onclick="pause()">⏸ Pause</button>
        <button onclick="nextSong()">Next ⏭</button>
    </div>

    <!-- Click Sound -->
    <audio id="clickSound" src="click.mp3"></audio>

    <!-- Music Player -->
    <audio id="musicPlayer"></audio>

    <script>
        let songs = [
            {file: "song1.mp3", name: "Song 1"},
            {file: "song2.mp3", name: "Song 2"},
            {file: "song3.mp3", name: "Song 3"}
        ];

        let currentIndex = 0;
        let player = document.getElementById("musicPlayer");

        function playMusic(index) {
            currentIndex = index;
            player.src = songs[index].file;
            player.play();

            document.getElementById("nowPlaying").innerText =
                "Now Playing: " + songs[index].name;
        }

        function nextSong() {
            currentIndex = (currentIndex + 1) % songs.length;
            playMusic(currentIndex);
        }

        function prevSong() {
            currentIndex = (currentIndex - 1 + songs.length) % songs.length;
            playMusic(currentIndex);
        }

        function play() {
            player.play();
            playClick();
        }

        function pause() {
            player.pause();
            playClick();
        }

        function playClick() {
            let sound = document.getElementById("clickSound");
            sound.currentTime = 0;
            sound.play();
        }
    </script>

</body>
</html>
